databases:
  - name: mysitedb
    plan: free
    databasename: ryutada
    user: ryuta114729
services:
  - type: web
    plan: free
    name: book shelf
    runtime: python
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn bookproject].asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mysitedb
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 4